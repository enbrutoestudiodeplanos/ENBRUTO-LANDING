<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 · Página no encontrada · En Bruto Estudio</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px);
    }
    .error-card {
      position: relative;
      width: min(480px, 100%);
      padding: 52px 52px 56px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.022) 0%, rgba(255,255,255,0.005) 100%),
        rgba(0,0,0,0.16);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 50px 140px rgba(0,0,0,0.4);
    }
    .error-code {
      font-size: clamp(5rem, 14vw, 8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.14);
      margin: 0 0 8px;
      user-select: none;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 32px;
    }
    @media (max-width: 540px) {
      .error-card { padding: 36px 24px 40px; }
      .error-actions { flex-direction: column; }
      .error-actions a,
      .error-actions button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="site-shell">

    <div class="error-shell">
      <div class="error-card">

        <p class="eyebrow">Error</p>
        <div class="error-code" aria-hidden="true">404</div>
        <h1 style="font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;letter-spacing:-0.02em;margin:0 0 12px;">
          Página no encontrada
        </h1>
        <p class="lead compact" style="max-width:340px;">
          La página que buscás no existe o fue movida. Revisá la URL o volvé al inicio.
        </p>

        <div class="error-actions">
          <a href="index.html" class="primary-button" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m15 18-6-6 6-6"/>
            </svg>
            <span>Ir al inicio</span>
          </a>
          <a href="mailto:contacto@enbrutoestudio.com.ar" class="mini-button"
            style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
            Contacto
          </a>
        </div>

      </div>
    </div>

    <footer class="site-footer">
      <a href="mailto:contacto@enbrutoestudio.com.ar" class="footer-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </svg>
        contacto@enbrutoestudio.com.ar
      </a>
      <span class="footer-sep">·</span>
      <span class="footer-link" style="cursor:default;opacity:0.45;">En Bruto Estudio</span>
    </footer>

  </main>
</body>
</html>
