<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow" />
  <title>404 — EN BRUTO</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .error-404 {
      min-height: 100vh;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      font-family: "Noto Sans", -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .error-content {
      width: min(600px, 100%);
      position: relative;
    }

    .error-content::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
      background: rgba(200, 185, 154, 0.06);
      transform: translateX(-50%);
      pointer-events: none;
    }

    .error-code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 2.5rem;
      font-size: clamp(6rem, 14vw, 9rem);
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.02em;
      position: relative;
    }

    .error-code span {
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(200, 185, 154, 0.9);
    }

    .error-logo-zero {
      height: 0.78em;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      margin: 0 0.04em;
      filter: invert(1) sepia(0.25) saturate(1.6) hue-rotate(5deg) brightness(0.92);
      mix-blend-mode: screen;
    }

    .error-spec {
      text-align: center;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: rgba(200, 185, 154, 0.4);
      text-transform: uppercase;
      margin-top: -1.5rem;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .error-title {
      margin: 0 0 1.2rem;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      text-align: center;
    }

    .error-text {
      margin: 0 auto 3rem;
      max-width: 32ch;
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
    }

    .error-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      text-decoration: none;
      color: rgba(200, 185, 154, 0.45);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(200, 185, 154, 0.08);
      width: 100%;
      max-width: 180px;
      margin: 0 auto;
      transition: all 0.25s ease;
    }

    .error-btn::before {
      content: "←";
      font-size: 0.85rem;
      opacity: 0.5;
      transition: transform 0.25s ease;
    }

    .error-btn:hover {
      color: rgba(200, 185, 154, 0.85);
      border-top-color: rgba(200, 185, 154, 0.2);
    }

    .error-btn:hover::before {
      transform: translateX(-3px);
      opacity: 0.9;
    }

    .error-btn:focus-visible {
      outline: 1px solid rgba(200, 185, 154, 0.4);
      outline-offset: 6px;
      color: rgba(200, 185, 154, 0.85);
    }

    @media (max-width: 768px) {
      .error-404 {
        padding: 5rem 1.5rem;
        align-items: flex-start;
      }

      .error-content::before {
        display: none;
      }

      .error-code {
        margin-bottom: 1.5rem;
        gap: 0;
      }

      .error-code span {
        -webkit-text-stroke: 1px rgba(200, 185, 154, 0.9);
      }

      .error-spec {
        margin-top: -0.5rem;
        margin-bottom: 1.8rem;
        letter-spacing: 0.25em;
      }

      .error-title {
        font-size: clamp(1.8rem, 8vw, 2.4rem);
        line-height: 1;
      }

      .error-text {
        font-size: 0.95rem;
        margin-bottom: 2rem;
      }

      .error-btn {
        border-top: none;
        padding-top: 0;
      }
    }
  </style>
</head>
<body>

  <section class="error-404">
    <div class="error-content">

      <div class="error-code" aria-label="Error 404">
        <span aria-hidden="true">4</span>
        <img src="assets/zero-404.png" alt="" class="error-logo-zero" aria-hidden="true">
        <span aria-hidden="true">4</span>
      </div>

      <div class="error-spec" aria-hidden="true">CÓDIGO — 404</div>

      <h1 class="error-title">
        ACÁ NO<br>HAY OBRA
      </h1>

      <p class="error-text">
        La ruta que buscás no existe o fue desplazada.
      </p>

      <a href="/" class="error-btn">
        regresar
      </a>

    </div>
  </section>

</body>
</html>
