<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Crear contraseña · En Bruto Estudio</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell portal-shell">
    <section class="card split-card">

      <div class="left-panel">
        <p class="eyebrow">Acceso clientes</p>
        <h1>En Bruto<br>Estudio</h1>

        <!-- Vista: cargando -->
        <div id="loadingView">
          <p class="lead compact" style="color:rgba(255,255,255,0.5);">Verificando enlace…</p>
        </div>

        <!-- Vista: formulario de contraseña -->
        <div id="formView" style="display:none;">
          <p class="lead compact" style="margin-bottom:28px;">Creá tu contraseña de acceso al portal.</p>
          <form id="setPasswordForm" class="stack-form" novalidate>
            <label for="newPassword">Nueva contraseña</label>
            <div class="field-wrap">
              <input id="newPassword" name="password" type="password"
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password" required minlength="8" />
            </div>
            <label for="confirmPassword">Confirmá la contraseña</label>
            <div class="field-wrap">
              <input id="confirmPassword" name="confirm" type="password"
                placeholder="Repetí la contraseña"
                autocomplete="new-password" required />
            </div>
            <button class="primary-button" type="submit"><span>Crear contraseña</span></button>
            <p id="setPasswordMsg" class="status-message" aria-live="polite"></p>
          </form>
        </div>

        <!-- Vista: éxito -->
        <div id="successView" style="display:none;">
          <p class="eyebrow" style="color:#b8d4a0;margin-bottom:12px;">Contraseña creada</p>
          <p class="lead compact">Ya podés ingresar al portal con tu correo y la nueva contraseña.</p>
          <a href="index.html" class="mini-button" style="display:inline-flex;margin-top:28px;text-decoration:none;">
            Ir al login
          </a>
        </div>

        <!-- Vista: error de enlace -->
        <div id="errorView" style="display:none;">
          <p class="eyebrow" style="color:#e57373;margin-bottom:12px;">Enlace inválido</p>
          <p class="lead compact" id="errorText">El enlace de invitación es inválido o ya fue utilizado.</p>
          <a href="index.html" class="mini-button" style="display:inline-flex;margin-top:28px;text-decoration:none;">
            Volver al inicio
          </a>
        </div>

      </div>

      <div class="right-panel logo-panel" aria-hidden="true">
        <img src="assets/LANDING.svg" class="topo-bg" alt="" />
        <div class="hero-stage">
          <div class="hero-stage__glow"></div>
          <div class="hero-stage__frame">
            <img src="assets/isologo.svg" alt="" class="hero-logo" />
          </div>
        </div>
      </div>

    </section>
  </main>
  <script src="password-form.js"></script>
</body>
</html>
