<body>
  <main class="site-shell portal-shell">
    <section class="card split-card">

```
  <div class="left-panel">
    <p class="eyebrow">Acceso clientes</p>
    <h1>En Bruto<br>Estudio</h1>
    <p class="lead">Portal privado para clientes autorizados.</p>

    <div class="tabs" role="tablist">
      <button class="tab is-active" data-view="login"   role="tab">Acceder</button>
      <button class="tab"           data-view="request" role="tab">Solicitar acceso</button>
    </div>

    <!-- Vista: login -->
    <div class="view is-active" data-content="login">
      <form id="loginForm" class="stack-form" novalidate>
        <label for="loginEmail">Correo electrónico</label>
        <input id="loginEmail" name="email" type="email"
               placeholder="contacto@estudio.com"
               autocomplete="email" required />
        <button class="primary-button ghost-button" type="submit">Acceder</button>
        <p id="loginMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>

    <!-- Vista: solicitar acceso -->
    <div class="view" data-content="request">
      <form id="requestForm" class="stack-form" novalidate>
        <label for="requestStudio">Nombre del estudio</label>
        <input id="requestStudio" name="studio" type="text"
               placeholder="Estudio Pérez" required />
        <label for="requestEmail">Correo</label>
        <input id="requestEmail" name="email" type="email"
               placeholder="contacto@estudio.com" required />
        <label for="requestPhone">Teléfono</label>
        <input id="requestPhone" name="phone" type="tel"
               placeholder="+54 11 0000-0000" required />
        <button class="primary-button ghost-button" type="submit">Solicitar acceso</button>
        <p id="requestMessage" class="status-message" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div class="right-panel logo-panel" aria-hidden="true">
    <img src="assets/isologo.jpeg" alt="" class="hero-logo" />
  </div>

</section>
