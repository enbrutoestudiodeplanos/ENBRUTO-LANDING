<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EN BRUTO — Estudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>

    /* ============================================================
       TOKENS
       ============================================================ */
    :root {
      --c-black  : #0A0A0A;
      --c-white  : #FFFFFF;
      --c-900    : #111111;
      --c-800    : #1A1A1A;
      --c-700    : #232323;
      --c-600    : #2E2E2E;
      --c-400    : #555555;
      --c-300    : #888888;
      --c-200    : #BBBBBB;
      --f-display: 'Bebas Neue', sans-serif;
      --f-body   : 'Inter', sans-serif;
      --ease     : cubic-bezier(0.77, 0, 0.175, 1);
      --ease-soft: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--c-black);
      color: var(--c-white);
      font-family: var(--f-body);
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    /* ============================================================
       CUSTOM CURSOR
       ============================================================ */
    #cur-dot,
    #cur-ring {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      will-change: left, top;
      transition: left 0.02s, top 0.02s;
    }

    #cur-dot {
      width: 6px; height: 6px;
      background: var(--c-white);
      border-radius: 50%;
    }

    #cur-ring {
      width: 28px; height: 28px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      transition: width 0.25s var(--ease-soft),
                  height 0.25s var(--ease-soft),
                  border-color 0.25s;
    }

    body.cur-expand #cur-ring {
      width: 48px; height: 48px;
      border-color: rgba(255,255,255,0.55);
    }

    @media (pointer: coarse) {
      #cur-dot, #cur-ring { display: none; }
    }

    /* ============================================================
       LANDING
       ============================================================ */
    #landing {
      position: fixed; inset: 0; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
    }

    /* Logo mark */
    .logo-mark {
      width: 54px; height: 54px;
      border: 1.5px solid var(--c-white);
      position: relative;
      cursor: none;
      transition: transform 0.55s var(--ease);
    }
    .logo-mark::after {
      content: '';
      position: absolute; inset: 10px;
      background: var(--c-white);
      transform: rotate(45deg);
      transition: opacity 0.3s;
    }
    .logo-mark:hover { transform: scale(1.07) rotate(3deg); }
    .logo-mark.pressing::after { opacity: 0.35; }

    /* SVG ring for long-press progress */
    .lp-ring {
      position: absolute;
      inset: -9px; /* ring container is 72x72 */
      pointer-events: none;
    }
    .lp-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .lp-ring circle {
      fill: none;
      stroke: var(--c-white);
      stroke-width: 1.5;
      /* circumference of r=35 ≈ 220 */
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      transition: none;
    }
    .logo-mark.pressing .lp-ring circle {
      animation: lp-fill 2s linear forwards;
    }
    @keyframes lp-fill { to { stroke-dashoffset: 0; } }

    /* Logo wordmark */
    .logo-wordmark {
      font-family: var(--f-display);
      font-size: 11px;
      letter-spacing: 10px;
      color: var(--c-300);
    }

    /* Tagline */
    .tagline {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; letter-spacing: 4px;
      color: var(--c-700); text-transform: uppercase;
      white-space: nowrap;
    }

    /* ============================================================
       ENTRY FLASH
       ============================================================ */
    #flash {
      position: fixed; inset: 0; z-index: 98;
      background: var(--c-white);
      opacity: 0; pointer-events: none;
      transition: opacity 0.05s;
    }
    #flash.on { opacity: 0.07; }

    /* ============================================================
       EASTER EGG CONTAINER
       ============================================================ */
    #ee {
      position: fixed; inset: 0; z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.75s var(--ease);
    }
    #ee.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ============================================================
       BACKGROUND GRID (architectural reveal)
       ============================================================ */
    #bg-grid {
      position: fixed; inset: 0; z-index: 101;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      pointer-events: none;
      gap: 1px;
      background: var(--c-900); /* gap color */
    }

    .bg-cell {
      position: relative;
      background-size: calc(500% - 4px) calc(200% - 2px);
      background-repeat: no-repeat;
      opacity: 0;
      transform: scale(1.05);
      transition:
        opacity   0.9s var(--ease),
        transform 1.1s var(--ease);
    }
    .bg-cell.on {
      opacity: 1;
      transform: scale(1);
    }
    /* Dark veil over each revealed cell */
    .bg-cell::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,10,0.5);
    }

    /* ============================================================
       TOPBAR
       ============================================================ */
    .ee-topbar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 26px 36px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 150;
    }

    .ee-label {
      font-size: 9px; letter-spacing: 5px;
      color: var(--c-400); text-transform: uppercase;
    }

    #btn-close {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border: 1px solid var(--c-700);
      background: transparent;
      color: var(--c-300);
      font-size: 13px; cursor: none;
      transition: border-color 0.3s, color 0.3s, transform 0.4s var(--ease);
    }
    #btn-close:hover {
      border-color: var(--c-white);
      color: var(--c-white);
      transform: rotate(90deg);
    }

    /* ============================================================
       PROGRESS (bottom-right)
       ============================================================ */
    #progress {
      position: fixed; bottom: 32px; left: 80px;
      z-index: 150; text-align: left;
    }

    .prog-label {
      display: block;
      font-size: 9px; letter-spacing: 4px;
      color: var(--c-400); text-transform: uppercase;
      margin-bottom: 2px;
    }

    .prog-num {
      display: block;
      font-family: var(--f-display);
      font-size: 56px; line-height: 1;
      color: var(--c-white);
    }

    .prog-bar {
      height: 1px; width: 72px;
      background: var(--c-700);
      margin: 6px 0 0;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%; width: 0%;
      background: var(--c-white);
      transition: width 0.7s var(--ease);
    }

    /* ============================================================
       MOVIE LIST
       ============================================================ */
    #movie-list {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 58%; z-index: 110;
      display: flex; flex-direction: column; justify-content: center;
      padding: 86px 52px 60px 72px;
      overflow-y: auto; scrollbar-width: none;
    }
    #movie-list::-webkit-scrollbar { display: none; }

    /* Individual row */
    .m-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      column-gap: 22px;
      padding: 13px 0;
      border-bottom: 1px solid var(--c-800);
      cursor: none; position: relative;
      opacity: 0;
      animation: row-in 0.5s var(--ease) calc(var(--i, 0) * 45ms + 150ms) forwards;
      transition: border-bottom-color 0.3s;
    }
    .m-row:first-child { border-top: 1px solid var(--c-800); }
    .m-row:hover { border-bottom-color: var(--c-600); }

    @keyframes row-in {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Underline sweep */
    .m-row::after {
      content: '';
      position: absolute; bottom: -1px; left: 0;
      height: 1px; width: 0;
      background: var(--c-white);
      transition: width 0.4s var(--ease);
    }
    .m-row:hover::after { width: 100%; }

    /* Custom checkbox */
    .m-chk {
      -webkit-appearance: none; appearance: none;
      width: 15px; height: 15px;
      border: 1px solid var(--c-400);
      background: transparent; cursor: none;
      position: relative; flex-shrink: 0;
      transition: border-color 0.3s, background 0.25s;
    }
    .m-chk:checked {
      background: var(--c-white);
      border-color: var(--c-white);
    }
    .m-chk:checked::after {
      content: '';
      position: absolute; top: 1px; left: 4px;
      width: 4px; height: 7px;
      border-right: 1.5px solid var(--c-black);
      border-bottom: 1.5px solid var(--c-black);
      transform: rotate(45deg);
    }
    .m-row:hover .m-chk { border-color: var(--c-200); }

    /* Title */
    .m-title {
      font-family: var(--f-display);
      font-size: clamp(15px, 1.6vw, 21px);
      letter-spacing: 2px;
      transition: letter-spacing 0.45s var(--ease), color 0.3s;
    }
    .m-row:hover .m-title { letter-spacing: 5px; }
    .m-row.done .m-title {
      color: var(--c-400);
      text-decoration: line-through;
      text-decoration-color: var(--c-600);
    }

    .m-year {
      font-size: 9px; letter-spacing: 2px;
      color: var(--c-400); margin-left: 12px;
    }

    /* Director */
    .m-dir {
      font-size: 9px; letter-spacing: 2px;
      color: var(--c-400); white-space: nowrap;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .m-row:hover .m-dir { color: var(--c-200); }

    /* ============================================================
       HOVER CARD (glassmorphism)
       ============================================================ */
    #card {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 42%; z-index: 110;
      background: var(--c-900);
      border-left: 1px solid var(--c-800);
      overflow: hidden;
    }

    #card-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s;
    }
    #card-placeholder::after {
      content: '— hover a film';
      font-size: 8px; letter-spacing: 5px;
      color: var(--c-700); text-transform: uppercase;
    }
    #card.show #card-placeholder { opacity: 0; pointer-events: none; }

    .card-content {
      height: 100%;
      display: flex; flex-direction: column;
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    #card.show .card-content { opacity: 1; }

    .card-img {
      width: 100%; height: 38%;
      object-fit: cover; object-position: center 15%;
      display: block; flex-shrink: 0;
      filter: grayscale(25%) contrast(1.05);
      transition: filter 0.5s var(--ease-soft);
    }
    #card.show .card-img { filter: grayscale(0%) contrast(1.05); }

    .card-body { padding: 28px 32px; flex: 1; overflow: hidden; }

    .card-title {
      font-family: var(--f-display);
      font-size: 21px; letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .card-dir {
      font-size: 8px; letter-spacing: 3px;
      color: var(--c-400); text-transform: uppercase;
      margin-bottom: 10px;
    }
    .card-synopsis {
      font-size: 11px; line-height: 1.8;
      color: var(--c-300); margin-bottom: 14px;
    }

    .card-ratings {
      display: flex; gap: 20px; margin-bottom: 14px;
    }
    .card-rating {
      display: flex; flex-direction: column; gap: 1px;
    }
    .card-rating b {
      font-family: var(--f-display);
      font-size: 17px; color: var(--c-white);
    }
    .card-rating span {
      font-size: 7px; letter-spacing: 2px;
      color: var(--c-400); text-transform: uppercase;
    }

    .card-cta {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--c-white); text-decoration: none;
      font-family: var(--f-body);
      font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
      cursor: none;
      transition: background 0.3s, border-color 0.3s;
    }
    .card-cta:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.25);
    }

    /* ============================================================
       UNLOCK SCREEN
       ============================================================ */
    #unlock {
      position: fixed; inset: 0; z-index: 600;
      background: var(--c-black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.9s var(--ease);
    }
    #unlock.show { opacity: 1; pointer-events: all; }

    /* Staggered children — empiezan ocultos, animan cuando el padre tiene .show */
    .unlock-tag  { font-size: 9px; letter-spacing: 6px; color: var(--c-400); text-transform: uppercase; margin-bottom: 18px; opacity: 0; }
    .unlock-head { font-family: var(--f-display); font-size: clamp(60px, 11vw, 128px); letter-spacing: 4px; margin-bottom: 26px; opacity: 0; }
    .unlock-rule { width: 60px; height: 1px; background: var(--c-600); margin: 0 auto 26px; opacity: 0; }
    .unlock-q    { font-size: 13px; font-style: italic; line-height: 1.9; color: var(--c-300); max-width: 440px; margin-bottom: 6px; opacity: 0; }
    .unlock-auth { font-size: 9px; letter-spacing: 3px; color: var(--c-400); text-transform: uppercase; opacity: 0; }
    .unlock-btn  {
      margin-top: 44px; padding: 11px 32px;
      background: transparent;
      border: 1px solid var(--c-700); color: var(--c-400);
      font-family: var(--f-body); font-size: 9px;
      letter-spacing: 4px; text-transform: uppercase; cursor: none;
      transition: border-color 0.3s, color 0.3s;
      opacity: 0;
    }
    .unlock-btn:hover { border-color: var(--c-white); color: var(--c-white); }

    #unlock.show .unlock-tag  { animation: lift 0.7s var(--ease) 0.35s both; }
    #unlock.show .unlock-head { animation: lift 0.7s var(--ease) 0.5s  both; }
    #unlock.show .unlock-rule { animation: lift 0.7s var(--ease) 0.62s both; }
    #unlock.show .unlock-q    { animation: lift 0.7s var(--ease) 0.72s both; }
    #unlock.show .unlock-auth { animation: lift 0.7s var(--ease) 0.86s both; }
    #unlock.show .unlock-btn  { animation: lift 0.7s var(--ease) 1s    both; }

    @keyframes lift {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

      synopsis: 'La burocracia hecha arquitectura. Gilliam construye un world-building que anticipa toda crítica al espacio institucional como mecanismo de control.',
      imdb: '8.0', rt: '98%',
      trailer: 'https://www.youtube.com/watch?v=nqIDmWBSiAA',
      img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&h=400&fit=crop&q=80'
    },
    {
      id: 10, title: 'GHOST IN THE SHELL', year: 1995, director: 'Mamoru Oshii', tmdbId: 16908,
      synopsis: 'Hong Kong mutado en paisaje cyberpunk. La ciudad como cuerpo y el cuerpo como ciudad. Densidad vertical como condición espiritual urbana.',
      imdb: '8.0', rt: '96%',
      trailer: 'https://www.youtube.com/watch?v=Y7NwOA4EaK4',
      img: 'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=600&h=400&fit=crop&q=80'
    }
  ];

  /* ──────────────────────────────────────────────────────────
     CONFIG
     ────────────────────────────────────────────────────────── */
  const CFG = {
    KONAMI      : ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'],
    LONGPRESS_MS: 2000,
    STORAGE_KEY : 'enbruto_cine_progress',
    // Architectural background: Mies-influenced white modernist building
    BG_IMAGE    : 'https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=1920&q=85'
  };

  /* ──────────────────────────────────────────────────────────
     TMDB
     ────────────────────────────────────────────────────────── */
  const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiYzZiZjRjMWUzZGIxODg5MDEyYWNjNjIyYWQxYTAzNCIsIm5iZiI6MTc3NjA4Njk1Ni43MjgsInN1YiI6IjY5ZGNlZmFjMTQzN2I3YTE0NWQ5M2MxMSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.0KIB2RqjiDroapsroFPgwe8RmpSHPulCccAMm3EmqSk';

  /* ──────────────────────────────────────────────────────────
     MODULE: Storage
     ────────────────────────────────────────────────────────── */
  const Storage = {
    load () {
      try { return JSON.parse(localStorage.getItem(CFG.STORAGE_KEY)) || {}; }
      catch { return {}; }
    },
    save (data) {
      try { localStorage.setItem(CFG.STORAGE_KEY, JSON.stringify(data)); } catch {}
    }
  };

  /* ──────────────────────────────────────────────────────────
     MODULE: Posters
     ────────────────────────────────────────────────────────── */
  const Posters = (() => {
    const cache = {};
    const load = async (tmdbId) => {
      if (cache[tmdbId] !== undefined) return cache[tmdbId];
      cache[tmdbId] = null;
      try {
        const r = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?language=es-ES`, {
          headers: { 'Authorization': `Bearer ${TMDB_TOKEN}`, 'Accept': 'application/json' }
        });
        const d = await r.json();
        if (d.poster_path) cache[tmdbId] = `https://image.tmdb.org/t/p/w300${d.poster_path}`;
      } catch {}
      return cache[tmdbId];
    };
    return {
      prefetch () { FILMS.forEach(f => f.tmdbId && load(f.tmdbId)); },
      get       : load
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: Cursor
     ────────────────────────────────────────────────────────── */
  const Cursor = (() => {
    const dot  = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');

    document.addEventListener('mousemove', ({ clientX: x, clientY: y }) => {
      dot.style.left  = ring.style.left  = `${x}px`;
      dot.style.top   = ring.style.top   = `${y}px`;
    });

    return {
      expand (on) { document.body.classList.toggle('cur-expand', on); }
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: Konami
     ────────────────────────────────────────────────────────── */
  const Konami = (() => {
    let buf = [];
    return {
      listen (cb) {
        document.addEventListener('keydown', ({ key }) => {
          buf.push(key);
          if (buf.length > CFG.KONAMI.length) buf.shift();
          if (buf.join() === CFG.KONAMI.join()) { buf = []; cb(); }
        });
      }
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: LongPress
     ────────────────────────────────────────────────────────── */
  const LongPress = {
    attach (el, cb) {
      let timer;
      const start  = () => { el.classList.add('pressing'); timer = setTimeout(() => { el.classList.remove('pressing'); cb(); }, CFG.LONGPRESS_MS); };
      const cancel = () => { clearTimeout(timer); el.classList.remove('pressing'); };
      el.addEventListener('mousedown',   start);
      el.addEventListener('touchstart',  start, { passive: true });
      ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => el.addEventListener(ev, cancel));
    }
  };

  /* ──────────────────────────────────────────────────────────
     MODULE: Grid
     ────────────────────────────────────────────────────────── */
  const Grid = (() => {
    const cells = [];
    return {
      build (container, imgUrl) {
        for (let i = 0; i < 10; i++) {
          const col = i % 5, row = Math.floor(i / 5);
          const cell = document.createElement('div');
          cell.className = 'bg-cell';
          cell.style.backgroundImage    = `url('${imgUrl}')`;
          cell.style.backgroundPosition = `${col * 25}% ${row * 100}%`;
          container.appendChild(cell);
          cells.push(cell);
        }
      },
      set (idx, on) { cells[idx]?.classList.toggle('on', on); }
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: ProgressUI
     ────────────────────────────────────────────────────────── */
  const ProgressUI = (() => {
    const numEl  = document.getElementById('prog-num');
    const fillEl = document.getElementById('prog-fill');
    return {
      update (n) {
        numEl.textContent  = `${n}/10`;
        fillEl.style.width = `${n * 10}%`;
      }
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: Card (hover info panel)
     ────────────────────────────────────────────────────────── */
  const Card = (() => {
    const el = document.getElementById('card');
    const refs = {
      img   : document.getElementById('ci'),
      title : document.getElementById('ct'),
      dir   : document.getElementById('cd'),
      syn   : document.getElementById('cs'),
      imdb  : document.getElementById('ci-imdb'),
      rt    : document.getElementById('ci-rt'),
      cta   : document.getElementById('cta')
    };
    let hideTimer;

    return {
      show (film) {
        clearTimeout(hideTimer);
        refs.img.src         = film.img;
        refs.img.alt         = film.title;
        refs.title.textContent = film.title;
        refs.dir.textContent   = `${film.director} · ${film.year}`;
        refs.syn.textContent   = film.synopsis;
        refs.imdb.textContent  = film.imdb;
        refs.rt.textContent    = film.rt;
        refs.cta.href          = film.trailer;
        el.classList.add('show');
        if (film.tmdbId) {
          Posters.get(film.tmdbId).then(url => {
            if (url && el.classList.contains('show')) refs.img.src = url;
          });
        }
      },
      hide () { hideTimer = setTimeout(() => el.classList.remove('show'), 160); }
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: Unlock
     ────────────────────────────────────────────────────────── */
  const Unlock = (() => {
    const el = document.getElementById('unlock');
    document.getElementById('btn-unlock-close').addEventListener('click', () => el.classList.remove('show'));
    return { show () { el.classList.add('show'); } };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: MovieList
     ────────────────────────────────────────────────────────── */
  const MovieList = (() => {
    const container = document.getElementById('movie-list');
    let state = {};

    const countChecked = () => Object.values(state).filter(Boolean).length;

    const buildRow = (film, idx) => {
      const row = document.createElement('div');
      row.className = `m-row${state[film.id] ? ' done' : ''}`;
      row.style.setProperty('--i', idx);

      row.innerHTML = `
        <input class="m-chk" type="checkbox"${state[film.id] ? ' checked' : ''}>
        <div>
          <span class="m-title">${film.title}</span>
          <span class="m-year">${film.year}</span>
        </div>
        <span class="m-dir">${film.director}</span>
      `;

      row.querySelector('.m-chk').addEventListener('change', e => {
        state[film.id] = e.target.checked;
        Storage.save(state);
        row.classList.toggle('done', e.target.checked);
        Grid.set(idx, e.target.checked);
        ProgressUI.update(countChecked());
        if (countChecked() === FILMS.length) setTimeout(Unlock.show, 900);
      });

      row.addEventListener('mouseenter', () => { Cursor.expand(true);  Card.show(film); });
      row.addEventListener('mouseleave', () => { Cursor.expand(false); Card.hide(); });

      return row;
    };

    return {
      init (savedState) {
        state = savedState;
        FILMS.forEach((film, i) => container.appendChild(buildRow(film, i)));
      },
      count: countChecked
    };
  })();

  /* ──────────────────────────────────────────────────────────
     MODULE: EE (Easter Egg — orchestrator)
     ────────────────────────────────────────────────────────── */
  const EE = (() => {
    const overlay = document.getElementById('ee');
    const flash   = document.getElementById('flash');
    let isOpen = false;

    const trigger = () => {
      if (isOpen) return;
      isOpen = true;
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 80);
      overlay.classList.add('active');
    };

    const close = () => {
      isOpen = false;
      overlay.classList.remove('active');
    };

    return { trigger, close };
  })();

  /* ──────────────────────────────────────────────────────────
     INIT
     ────────────────────────────────────────────────────────── */
  (() => {
    const state = Storage.load();

    Grid.build(document.getElementById('bg-grid'), CFG.BG_IMAGE);
    MovieList.init(state);
    Posters.prefetch();

    // Restore persisted state
    const savedCount = Object.values(state).filter(Boolean).length;
    ProgressUI.update(savedCount);
    FILMS.forEach((f, i) => { if (state[f.id]) Grid.set(i, true); });

    // Wire triggers
    Konami.listen(EE.trigger);
    LongPress.attach(document.getElementById('logo-mark'), EE.trigger);
    document.getElementById('btn-close').addEventListener('click', EE.close);

    // Cursor expand on close button
    const btnClose = document.getElementById('btn-close');
    btnClose.addEventListener('mouseenter', () => Cursor.expand(true));
    btnClose.addEventListener('mouseleave', () => Cursor.expand(false));
  })();

  </script>
</body>
</html>
