<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>· · ·</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="easter-egg.css" />
</head>
<body>
  <main class="site-shell">
    <section class="card split-card">

      <!-- COLUMNA IZQUIERDA: Área visual dinámica -->
      <div class="left-panel visual-panel" id="visualPanel">
        
        <!-- Vista: Revelación de imagen (20 partes) -->
        <div class="reveal-container" id="revealView">
          <div class="reveal-grid" id="revealGrid">
            <!-- 20 celdas generadas por JS -->
          </div>
          <div class="reveal-counter">
            <span id="revealCount">0</span><span class="reveal-total">/20</span>
          </div>
        </div>

        <!-- Vista: Detalle de película -->
        <div class="movie-detail" id="movieDetail" style="display:none;">
          <button class="back-btn" id="backBtn" aria-label="Volver">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span>Volver</span>
          </button>
          <div class="detail-content" id="detailContent">
            <!-- Póster, resumen, trailer -->
          </div>
        </div>

      </div>

      <!-- COLUMNA DERECHA: Lista de películas -->
      <div class="right-panel list-panel" id="listPanel">
        <div class="list-header">
          <p class="eyebrow">Selección</p>
          <h1>Vistos</h1>
        </div>
        <ul class="movie-list" id="movieList">
          <!-- Items generados por JS -->
        </ul>
      </div>

    </section>
  </main>

  <script src="easter-egg.js"></script>
</body>
</html>
