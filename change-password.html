<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Cambiar contraseña · En Bruto Estudio</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" /></noscript>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell portal-shell">
    <section class="card split-card">

      <div class="left-panel">
        <p class="eyebrow">Primer acceso</p>
        <h1>En Bruto<br>Estudio</h1>

        <!-- Vista: formulario -->
        <div id="changeFormView">
          <p class="lead compact" style="margin-bottom:28px;">Para continuar, elegí tu contraseña definitiva.</p>
          <form id="changePasswordForm" class="stack-form" novalidate>
            <label for="newPassword">Nueva contraseña</label>
            <div class="field-wrap">
              <input id="newPassword" name="password" type="password"
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password" required minlength="8" />
            </div>
            <label for="confirmPassword">Confirmá la contraseña</label>
            <div class="field-wrap">
              <input id="confirmPassword" name="confirm" type="password"
                placeholder="Repetí la contraseña"
                autocomplete="new-password" required />
            </div>
            <button class="primary-button" type="submit"><span>Guardar contraseña</span></button>
            <p id="changeMsg" class="status-message" aria-live="polite"></p>
          </form>
          <button id="logoutBtn" class="mini-button" style="margin-top:20px;opacity:0.5;cursor:pointer;background:none;border:none;color:inherit;text-decoration:underline;">
            Cerrar sesión
          </button>
        </div>

        <!-- Vista: sesión inválida -->
        <div id="noSessionView" style="display:none;">
          <p class="eyebrow" style="color:#e57373;margin-bottom:12px;">Sesión expirada</p>
          <p class="lead compact">Tu sesión expiró o no es válida. Ingresá de nuevo.</p>
          <a href="index.html" class="mini-button" style="display:inline-flex;margin-top:28px;text-decoration:none;">
            Ir al login
          </a>
        </div>

      </div>

      <div class="right-panel logo-panel" aria-hidden="true">
        <img src="assets/LANDING.svg" class="topo-bg" alt="" />
        <div class="hero-stage">
          <div class="hero-stage__glow"></div>
          <div class="hero-stage__frame">
            <img src="assets/isologo.svg" alt="" class="hero-logo" />
          </div>
        </div>
      </div>

    </section>
  </main>
  <script src="app.js"></script>
  <script>
  (function () {
    const APPS_URL = typeof APPS_SCRIPT_URL !== 'undefined' ? APPS_SCRIPT_URL : '';
    const form     = document.getElementById('changePasswordForm');
    const msg      = document.getElementById('changeMsg');
    const logoutBtn = document.getElementById('logoutBtn');

    function setMsg(text, type) {
      if (!msg) return;
      msg.textContent = text;
      msg.classList.remove('is-error', 'is-success');
      if (type) msg.classList.add(type);
    }

    // Verificar sesión restringida
    const sid = getSessionId();
    if (!sid) {
      document.getElementById('changeFormView').style.display = 'none';
      document.getElementById('noSessionView').style.display  = 'block';
    } else {
      postData({ action: 'get_session' }).then(data => {
        if (!data.ok || !data.must_change_password) {
          if (data.ok && !data.must_change_password) {
            window.location.replace('panel.html');
          } else {
            clearSession();
            document.getElementById('changeFormView').style.display = 'none';
            document.getElementById('noSessionView').style.display  = 'block';
          }
        }
      }).catch(() => {});
    }

    // Logout
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        try { await postData({ action: 'logout' }); } catch {}
        clearSession();
        window.location.replace('index.html');
      });
    }

    // Submit
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('newPassword').value.trim();
        const confirm  = document.getElementById('confirmPassword').value.trim();
        const btn      = form.querySelector('button[type="submit"]');

        setMsg('');

        if (password.length < 8) { setMsg('Mínimo 8 caracteres.', 'is-error'); return; }
        if (password !== confirm) { setMsg('Las contraseñas no coinciden.', 'is-error'); return; }

        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span><span>Guardando…</span>'; }

        try {
          const data = await postData({ action: 'change_password', password });

          if (!data.ok) {
            setMsg(data.error || 'Error al cambiar la contraseña.', 'is-error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<span>Guardar contraseña</span>'; }
            return;
          }

          // Éxito — guardar nueva sesión y redirigir al panel
          setSessionId(data.sessionId, data.expiresAt);
          window.location.replace('panel.html');

        } catch (err) {
          setMsg(err.message || 'Error de conexión.', 'is-error');
          if (btn) { btn.disabled = false; btn.innerHTML = '<span>Guardar contraseña</span>'; }
        }
      });
    }
  })();
  </script>
</body>
</html>
